basePath: /api/v1
definitions:
  models.APIError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  models.APIResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/models.APIError'
      success:
        type: boolean
    type: object
  models.AdjustGoldRequest:
    properties:
      amount:
        description: Can be negative
        type: integer
      reason:
        minLength: 10
        type: string
    required:
    - amount
    - reason
    type: object
  models.AdjustGoldResponse:
    properties:
      action_id:
        type: string
      adjustment:
        type: integer
      new_balance:
        type: integer
      old_balance:
        type: integer
      reason:
        type: string
      user_id:
        type: string
    type: object
  models.AdminAction:
    properties:
      action_type:
        type: string
      admin_id:
        type: string
      created_at:
        type: string
      details:
        additionalProperties: {}
        type: object
      id:
        type: string
      ip_address:
        type: string
      target_user_id:
        type: string
    type: object
  models.AdminActionsResponse:
    properties:
      actions:
        items:
          $ref: '#/definitions/models.AdminAction'
        type: array
      page:
        type: integer
      per_page:
        type: integer
      total_count:
        type: integer
    type: object
  models.AnalyticsEvent:
    properties:
      event_name:
        type: string
      payload:
        additionalProperties: true
        type: object
      session_id:
        type: string
      timestamp:
        type: string
      user_id: {}
    required:
    - event_name
    - timestamp
    type: object
  models.AnalyticsEventsRequest:
    properties:
      events:
        items:
          $ref: '#/definitions/models.AnalyticsEvent'
        type: array
    required:
    - events
    type: object
  models.AnalyticsEventsResponse:
    properties:
      accepted:
        type: integer
      rejected:
        type: integer
    type: object
  models.AuthRequest:
    properties:
      displayName:
        type: string
      playfabId:
        type: string
    required:
    - playfabId
    type: object
  models.AuthResponse:
    properties:
      expiresIn:
        description: seconds
        type: integer
      jwt:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.BackupInfo:
    properties:
      backup_id:
        type: string
      created_at:
        type: string
      save_version:
        type: integer
    type: object
  models.BackupListResponse:
    properties:
      backups:
        items:
          $ref: '#/definitions/models.BackupInfo'
        type: array
    type: object
  models.BackupResponse:
    properties:
      backup_id:
        type: string
      created_at:
        type: string
      success:
        type: boolean
    type: object
  models.BanUserRequest:
    properties:
      banned_until:
        description: NULL = permanent
        type: string
      reason:
        minLength: 10
        type: string
    required:
    - reason
    type: object
  models.BanUserResponse:
    properties:
      ban_id:
        type: string
      banned_until:
        type: string
      is_permanent:
        type: boolean
      reason:
        type: string
      user_id:
        type: string
    type: object
  models.BaseData:
    properties:
      placed_objects:
        items:
          $ref: '#/definitions/models.PlacedObject'
        type: array
    type: object
  models.ExportUserDataResponse:
    properties:
      ban_history:
        items:
          $ref: '#/definitions/models.UserBan'
        type: array
      exported_at:
        type: string
      level_completions:
        items:
          additionalProperties: {}
          type: object
        type: array
      talents:
        items:
          additionalProperties: {}
          type: object
        type: array
      user:
        $ref: '#/definitions/models.UserProfile'
    type: object
  models.GlobalLeaderboardResponse:
    properties:
      leaderboard:
        items:
          $ref: '#/definitions/models.LeaderboardEntry'
        type: array
      page:
        type: integer
      perPage:
        type: integer
      total:
        type: integer
    type: object
  models.HollowWildsAuthResponse:
    properties:
      expires_in:
        type: integer
      player_id:
        type: string
      refresh_token:
        type: string
      token:
        type: string
    type: object
  models.HollowWildsLeaderboardEntry:
    properties:
      character:
        type: string
      combat_build:
        type: string
      display_name:
        type: string
      player_id:
        type: string
      rank:
        type: integer
      run_metadata:
        additionalProperties: true
        type: object
      updated_at:
        type: string
      value:
        type: integer
      world_seed:
        type: integer
    type: object
  models.HollowWildsLeaderboardResponse:
    properties:
      character:
        type: string
      entries:
        items:
          $ref: '#/definitions/models.HollowWildsLeaderboardEntry'
        type: array
      scope:
        type: string
      total:
        type: integer
      type:
        type: string
    type: object
  models.HollowWildsLoginRequest:
    properties:
      playfab_session_ticket:
        minLength: 1
        type: string
    required:
    - playfab_session_ticket
    type: object
  models.InventoryData:
    properties:
      equipped_weapon:
        type: string
      slots:
        items:
          $ref: '#/definitions/models.InventorySlot'
        type: array
    type: object
  models.InventorySlot:
    properties:
      item_id:
        type: string
      quantity:
        type: integer
      slot:
        type: integer
    type: object
  models.LeaderboardEntry:
    properties:
      bestTime:
        type: number
      displayName:
        type: string
      firstCompleted:
        type: string
      levelsCompleted:
        type: integer
      maxMapUnlocked:
        type: integer
      playCount:
        type: integer
      playerId:
        type: string
      rank:
        type: integer
      stars:
        type: integer
      totalStars:
        type: integer
    type: object
  models.LeaderboardStatsResponse:
    properties:
      average_time:
        type: number
      last_updated:
        type: string
      level_stats:
        items:
          $ref: '#/definitions/models.LevelStatsInfo'
        type: array
      levels_tracked:
        type: integer
      top_level_count:
        type: integer
      top_level_id:
        type: string
      total_entries:
        type: integer
      unique_players:
        type: integer
    type: object
  models.LeaderboardSubmitRequest:
    properties:
      character:
        enum:
        - RIMBA
        - DARA
        - BAYU
        - SARI
        type: string
      combat_build:
        enum:
        - balanced
        - berserker
        - shade_walker
        type: string
      run_metadata:
        additionalProperties: true
        type: object
      type:
        enum:
        - longest_run_days
        - sebilah_soul_level
        - bosses_killed
        type: string
      value:
        minimum: 0
        type: integer
      world_seed:
        type: integer
    required:
    - character
    - type
    - value
    type: object
  models.LeaderboardSubmitResponse:
    properties:
      character_rank:
        type: integer
      global_rank:
        type: integer
      is_personal_best:
        type: boolean
      previous_global_rank:
        type: integer
      success:
        type: boolean
    type: object
  models.LevelCompletionRequest:
    properties:
      counterCount:
        minimum: 0
        type: integer
      dashCount:
        minimum: 0
        type: integer
      finalHp:
        minimum: 0
        type: number
      levelId:
        type: string
      mapId:
        type: string
      timeSeconds:
        type: number
      vulnerableKills:
        minimum: 0
        type: integer
    required:
    - finalHp
    - levelId
    - mapId
    - timeSeconds
    type: object
  models.LevelCompletionResponse:
    properties:
      goldEarned:
        type: integer
      isFirstCompletion:
        type: boolean
      mapUnlocked:
        type: string
      newBestTime:
        type: boolean
      newTotalGold:
        type: integer
      newTotalStars:
        type: integer
      nextLevelUnlocked:
        type: string
      starsEarned:
        type: integer
      success:
        type: boolean
    type: object
  models.LevelLeaderboardResponse:
    properties:
      leaderboard:
        items:
          $ref: '#/definitions/models.LeaderboardEntry'
        type: array
      levelId:
        type: string
      mapId:
        type: string
      total:
        type: integer
    type: object
  models.LevelStatsInfo:
    properties:
      average_time:
        type: number
      best_time:
        type: number
      level_id:
        type: string
      total_entries:
        type: integer
      unique_players:
        type: integer
    type: object
  models.LoadGameResponse:
    properties:
      base:
        $ref: '#/definitions/models.BaseData'
      discovered_pois:
        items:
          type: string
        type: array
      inventory:
        $ref: '#/definitions/models.InventoryData'
      player:
        $ref: '#/definitions/models.PlayerState'
      player_id:
        type: string
      quest_flags:
        additionalProperties:
          type: boolean
        type: object
      save_version:
        type: integer
      sebilah:
        $ref: '#/definitions/models.SebilahData'
      updated_at:
        type: string
      world:
        $ref: '#/definitions/models.WorldData'
    type: object
  models.PlacedObject:
    properties:
      object_id:
        type: string
      x:
        type: number
      z:
        type: number
    type: object
  models.PlayerLeaderboardEntry:
    properties:
      character:
        type: string
      character_rank:
        type: integer
      global_rank:
        type: integer
      personal_best:
        type: boolean
      type:
        type: string
      value:
        type: integer
    type: object
  models.PlayerLeaderboardResponse:
    properties:
      entries:
        items:
          $ref: '#/definitions/models.PlayerLeaderboardEntry'
        type: array
    type: object
  models.PlayerState:
    properties:
      character:
        description: RIMBA, DARA, BAYU, SARI
        enum:
        - RIMBA
        - DARA
        - BAYU
        - SARI
        type: string
      health:
        maximum: 100
        minimum: 0
        type: number
      hunger:
        maximum: 100
        minimum: 0
        type: number
      position:
        $ref: '#/definitions/models.Vector2D'
      sanity:
        maximum: 100
        minimum: 0
        type: number
      warmth:
        maximum: 100
        minimum: 0
        type: number
    required:
    - character
    type: object
  models.PlayerStatsResponse:
    properties:
      averageStars:
        type: number
      bestTime:
        type: number
      displayName:
        type: string
      globalRank:
        type: integer
      levelsCompleted:
        type: integer
      maxMapUnlocked:
        type: integer
      playerId:
        type: string
      stars:
        type: integer
      surroundingPlayers:
        items:
          $ref: '#/definitions/models.LeaderboardEntry'
        type: array
      totalStars:
        type: integer
    type: object
  models.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  models.RefreshTokenResponse:
    properties:
      expires_in:
        type: integer
      token:
        type: string
    type: object
  models.ResetLeaderboardRequest:
    properties:
      reason:
        minLength: 10
        type: string
    required:
    - reason
    type: object
  models.RestoreRequest:
    properties:
      backup_id:
        type: string
    required:
    - backup_id
    type: object
  models.SaveGameRequest:
    properties:
      base:
        $ref: '#/definitions/models.BaseData'
      discovered_pois:
        items:
          type: string
        type: array
      inventory:
        $ref: '#/definitions/models.InventoryData'
      player:
        $ref: '#/definitions/models.PlayerState'
      quest_flags:
        additionalProperties:
          type: boolean
        type: object
      sebilah:
        $ref: '#/definitions/models.SebilahData'
      world:
        $ref: '#/definitions/models.WorldData'
    type: object
  models.SaveGameResponse:
    properties:
      save_version:
        type: integer
      success:
        type: boolean
      updated_at:
        type: string
    type: object
  models.SebilahData:
    properties:
      infusion_points:
        type: integer
      soul_level:
        type: integer
      weapon_id:
        type: string
    type: object
  models.SystemStatsResponse:
    properties:
      active_this_month:
        type: integer
      active_this_week:
        type: integer
      active_today:
        type: integer
      admin_actions_today:
        type: integer
      banned_users:
        type: integer
      last_updated:
        type: string
      levels_completed:
        type: integer
      total_gold_in_game:
        type: integer
      total_stars_earned:
        type: integer
      total_users:
        type: integer
    type: object
  models.TalentUpgradeRequest:
    properties:
      talentId:
        type: string
    required:
    - talentId
    type: object
  models.TalentUpgradeResponse:
    properties:
      goldSpent:
        type: integer
      newLevel:
        type: integer
      newTotalGold:
        type: integer
      nextLevelCost:
        type: integer
      statBonus:
        description: e.g., "+5% HP", "+3% Damage"
        type: string
      success:
        type: boolean
      talentId:
        type: string
    type: object
  models.UnbanUserRequest:
    properties:
      reason:
        type: string
    required:
    - reason
    type: object
  models.UnbanUserResponse:
    properties:
      unban_reason:
        type: string
      unbanned_at:
        type: string
      user_id:
        type: string
    type: object
  models.User:
    properties:
      banReason:
        type: string
      bannedAt:
        type: string
      createdAt:
        description: Metadata
        type: string
      deletedAt:
        description: GDPR
        type: string
      diamonds:
        type: integer
      displayName:
        type: string
      facebookId:
        description: Social
        type: string
      gold:
        description: Currency
        type: integer
      googleId:
        type: string
      id:
        type: string
      isBanned:
        description: Flags
        type: boolean
      lastLoginAt:
        type: string
      lastPlayedAt:
        type: string
      maxMapUnlocked:
        description: Progression
        type: integer
      playfabId:
        type: string
      totalPlayTimeSeconds:
        type: integer
      totalStarsCollected:
        type: integer
    type: object
  models.UserBan:
    properties:
      banned_by:
        type: string
      banned_until:
        description: NULL = permanent
        type: string
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      reason:
        type: string
      unban_reason:
        type: string
      unbanned_at:
        type: string
      unbanned_by:
        type: string
      user_id:
        type: string
    type: object
  models.UserProfile:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_admin:
        type: boolean
      is_banned:
        type: boolean
      last_login_at:
        type: string
      levels_completed:
        type: integer
      playfab_id:
        type: string
      total_gold:
        type: integer
      total_stars:
        type: integer
      username:
        type: string
    type: object
  models.UserSearchResponse:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total_count:
        type: integer
      users:
        items:
          $ref: '#/definitions/models.UserProfile'
        type: array
    type: object
  models.UserTalent:
    properties:
      currentLevel:
        type: integer
      id:
        type: string
      talentId:
        type: string
      upgradedAt:
        type: string
      userId:
        type: string
    type: object
  models.Vector2D:
    properties:
      x:
        type: number
      z:
        type: number
    type: object
  models.VersionConflictError:
    properties:
      error:
        type: string
      message:
        type: string
      server_version:
        type: integer
    type: object
  models.WorldData:
    properties:
      day_count:
        type: integer
      play_time_seconds:
        type: integer
      seed:
        type: integer
