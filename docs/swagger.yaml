host: gamefeel-backend.fly.dev
info:
  contact:
    email: support@gamefeel.com
    name: API Support
  description: Game backend API với PlayFab integration, anti-cheat validation, và
    talent system
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Hollow Wilds Backend API
  version: 1.1.0
paths:
  /admin/actions:
    get:
      description: Get audit log of all admin actions (admin only)
      parameters:
      - default: Bearer
        description: Bearer JWT token
        in: header
        name: Authorization
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Results per page (max 100)
        in: query
        name: perPage
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Admin actions
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.AdminActionsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "403":
          description: Forbidden - Admin only
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "500":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
      security:
      - BearerAuth: []
      summary: Get admin actions log
      tags:
      - Admin
  /admin/leaderboards/{levelId}:
    delete:
      consumes:
      - application/json
      description: Reset all entries for a specific level (admin only)
      parameters:
      - default: Bearer
        description: Bearer JWT token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Level ID
        in: path
        name: levelId
        required: true
        type: string
      - description: Reset reason
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ResetLeaderboardRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Leaderboard reset
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Invalid request
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "403":
          description: Forbidden - Admin only
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
      security:
      - BearerAuth: []
      summary: Reset leaderboard
      tags:
      - Admin
  /admin/leaderboards/stats:
    get:
      description: Get analytics for level leaderboards (admin only)
      parameters:
      - default: Bearer
        description: Bearer JWT token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Leaderboard stats
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.LeaderboardStatsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "403":
          description: Forbidden - Admin only
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
      security:
      - BearerAuth: []
      summary: Get leaderboard statistics
      tags:
      - Admin
  /admin/stats/overview:
    get:
      description: Get system overview statistics (admin only)
      parameters:
      - default: Bearer
        description: Bearer JWT token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: System stats
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.SystemStatsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "403":
          description: Forbidden - Admin only
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "500":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
      security:
      - BearerAuth: []
      summary: Get system statistics
      tags:
      - Admin
  /admin/users/{userId}/adjust-gold:
    post:
      consumes:
      - application/json
      description: Manually adjust user's gold balance (admin only)
      parameters:
      - default: Bearer
        description: Bearer JWT token
        in: header
        name: Authorization
        required: true
        type: string
      - description: User ID (UUID)
        in: path
        name: userId
        required: true
        type: string
      - description: Gold adjustment request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AdjustGoldRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Gold adjusted
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.AdjustGoldResponse'
              type: object
        "400":
          description: Invalid request
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "403":
          description: Forbidden - Admin only
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "500":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
